<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Share</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
    }
    h1 { text-align: center; color: #00d4ff; }
    .upload-area {
      border: 2px dashed #00d4ff;
      border-radius: 12px;
      padding: 40px;
      text-align: center;
      margin-bottom: 30px;
      cursor: pointer;
      transition: background 0.3s;
    }
    .upload-area:hover { background: rgba(0,212,255,0.1); }
    .upload-area.dragging { background: rgba(0,212,255,0.2); }
    #fileInput { display: none; }
    .progress {
      height: 8px;
      background: #333;
      border-radius: 4px;
      margin-top: 15px;
      display: none;
    }
    .progress-bar {
      height: 100%;
      background: #00d4ff;
      border-radius: 4px;
      width: 0%;
      transition: width 0.3s;
    }
    .video-list { display: flex; flex-direction: column; gap: 12px; }
    .video-item {
      background: #16213e;
      padding: 15px;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }
    .video-info {
      flex: 1;
      min-width: 200px;
    }
    .video-name {
      font-weight: 500;
      word-break: break-all;
    }
    .video-meta {
      font-size: 12px;
      color: #888;
      margin-top: 4px;
    }
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
    }
    .btn-download {
      background: #00d4ff;
      color: #000;
    }
    .btn-delete {
      background: #ff4757;
      color: #fff;
    }
    .btn:hover { opacity: 0.9; }
    .status {
      text-align: center;
      padding: 10px;
      margin-bottom: 20px;
      border-radius: 6px;
      display: none;
    }
    .status.success { background: #2ed573; color: #000; display: block; }
    .status.error { background: #ff4757; display: block; }
    .loading { text-align: center; padding: 40px; color: #888; }
  </style>
</head>
<body>
  <h1>Video Share</h1>

  <div id="status" class="status"></div>

  <div class="upload-area" id="uploadArea">
    <input type="file" id="fileInput" accept="video/*,image/*">
    <p>Click or drag files here to upload</p>
    <div class="progress" id="progress">
      <div class="progress-bar" id="progressBar"></div>
    </div>
  </div>

  <h2>Files</h2>
  <div class="video-list" id="videoList">
    <div class="loading">Loading...</div>
  </div>

  <script>
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const videoList = document.getElementById('videoList');
    const progress = document.getElementById('progress');
    const progressBar = document.getElementById('progressBar');
    const status = document.getElementById('status');

    uploadArea.addEventListener('click', () => fileInput.click());
    uploadArea.addEventListener('dragover', e => {
      e.preventDefault();
      uploadArea.classList.add('dragging');
    });
    uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragging'));
    uploadArea.addEventListener('drop', e => {
      e.preventDefault();
      uploadArea.classList.remove('dragging');
      if (e.dataTransfer.files.length) uploadFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', () => {
      if (fileInput.files.length) uploadFile(fileInput.files[0]);
    });

    function showStatus(msg, type) {
      status.textContent = msg;
      status.className = 'status ' + type;
      setTimeout(() => status.className = 'status', 3000);
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    async function uploadFile(file) {
      const formData = new FormData();
      formData.append('video', file);

      progress.style.display = 'block';
      progressBar.style.width = '0%';

      try {
        const xhr = new XMLHttpRequest();
        xhr.upload.onprogress = e => {
          if (e.lengthComputable) {
            progressBar.style.width = (e.loaded / e.total * 100) + '%';
          }
        };
        xhr.onload = () => {
          progress.style.display = 'none';
          if (xhr.status === 200) {
            showStatus('Uploaded!', 'success');
            loadVideos();
          } else {
            showStatus('Upload failed', 'error');
          }
        };
        xhr.onerror = () => {
          progress.style.display = 'none';
          showStatus('Upload failed', 'error');
        };
        xhr.open('POST', '/api/upload');
        xhr.send(formData);
      } catch (err) {
        progress.style.display = 'none';
        showStatus('Upload failed', 'error');
      }
    }

    async function loadVideos() {
      try {
        const res = await fetch('/api/videos');
        const videos = await res.json();

        if (!videos.length) {
          videoList.innerHTML = '<div class="loading">No files yet</div>';
          return;
        }

        videoList.innerHTML = videos.map(v => `
          <div class="video-item">
            <div class="video-info">
              <div class="video-name">${v.key}</div>
              <div class="video-meta">${formatSize(v.size)} • ${new Date(v.lastModified).toLocaleString()}</div>
            </div>
            <button class="btn btn-download" onclick="download('${encodeURIComponent(v.key)}')">Download</button>
            <button class="btn btn-delete" onclick="del('${encodeURIComponent(v.key)}')">Delete</button>
          </div>
        `).join('');
      } catch (err) {
        videoList.innerHTML = '<div class="loading">Error loading files</div>';
      }
    }

    async function download(key) {
      const res = await fetch('/api/download/' + key);
      const data = await res.json();
      window.open(data.url, '_blank');
    }

    async function del(key) {
      if (!confirm('Delete this file?')) return;
      await fetch('/api/delete/' + key, { method: 'DELETE' });
      showStatus('Deleted!', 'success');
      loadVideos();
    }

    loadVideos();
  </script>
</body>
</html>
